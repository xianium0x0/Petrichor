<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWS — Petrich∅r</title>
  <meta name="description" content="Petrich∅r 最新情報・お知らせ一覧。">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/news.css">
</head>
<body>

  <div id="preloader" style="display:none">
    <div class="preloader-corners" aria-hidden="true">
      <div class="preloader-corner"></div>
      <div class="preloader-corner"></div>
      <div class="preloader-corner"></div>
      <div class="preloader-corner"></div>
    </div>
    <p class="preloader-logo">Petrich<span class="preloader-symbol">&#x2205;</span>r</p>
    <p class="preloader-sub">underground idol</p>
    <div class="preloader-progress-wrap">
      <div class="preloader-progress-label">
        <span class="preloader-progress-text">LOADING</span>
        <span class="preloader-progress-pct">...</span>
      </div>
      <div class="preloader-bar-wrap">
        <div class="preloader-bar"></div>
      </div>
    </div>
  </div>

  <div id="scroll-progress" aria-hidden="true"></div>
  <div id="header-placeholder"></div>

  <!-- PAGE BANNER -->
  <section class="page-banner" aria-label="ページタイトル">
    <div class="page-banner-inner">
      <p class="page-banner-label">Petrich∅r</p>
      <h1 class="page-banner-title">News</h1>
      <p class="page-banner-sub">— 最新情報・お知らせ —</p>
    </div>
  </section>

  <!-- ====================================================
       NEWS LIST
  ===================================================== -->
  <section class="section" aria-label="ニュース一覧">
    <div class="section-inner">

      <!-- ★ data/news.json を編集するとここに反映されます -->
      <ul class="news-list" id="news-list-all" data-reveal data-stagger="0.06"></ul>

    </div>
  </section>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <button id="back-to-top" aria-label="ページ上部へ戻る">↑</button>
  <script type="module" src="js/main.js"></script>
</body>
</html>
